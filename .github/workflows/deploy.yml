name: Build & Deploy (Production – public SiteKit 1.0.1 → GitHub Pages, wwdcnotes.com)

# Builds the WWDCNotes SiteKit site and publishes it to the gh-pages branch serving wwdcnotes.com.
#
# GitHub Pages has no server-side redirects, so a post-build step writes a meta-refresh stub for
# every legacy /documentation/wwdcnotes/* URL (see Tools/redirect-stubs) so old links keep working.
#
# SiteKit is public, so no checkout token is needed; the only secret is the automatic GITHUB_TOKEN
# (used to push gh-pages and for generate-metadata's GitHub avatar lookups).
#
# Guard: only run on GitHub.com, not on a mirror that also executes .github/workflows.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "github-pages-prod"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-deploy:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout WWDCNotes
        uses: actions/checkout@v4
        with:
          path: Public/Content/WWDCNotes/PublicContent

      - name: Checkout SiteKit (public, tag 1.0.1)
        uses: actions/checkout@v4
        with:
          repository: FlineDev/SiteKit
          ref: '1.0.1'
          fetch-depth: 0
          path: Public/SiteKit

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install ImageMagick (for SiteKit's ImageResizer)
        run: sudo apt-get update -qq && sudo apt-get install -y imagemagick webp || echo "ImageMagick install skipped - ImageResizer will fall back to no-op"

      - name: Generate Metadata
        working-directory: Public/Content/WWDCNotes/PublicContent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: swift run generate-metadata

      - name: Wipe stale build output before a clean build
        working-directory: Public/Content/WWDCNotes/PublicContent/Site
        run: rm -rf _Site

      - name: Build site (SiteKit DocC renderer, production base URL)
        working-directory: Public/Content/WWDCNotes/PublicContent/Site
        run: swift run -c release Site build --base-url https://wwdcnotes.com

      # GitHub Pages has no server-side redirects. SiteKit emits stubs for the explicit Redirects.yaml
      # rules; this step also expands the wildcard rule into a stub for every legacy session URL, so
      # all old links resolve.
      - name: Generate redirect stubs for old URLs
        working-directory: Public/Content/WWDCNotes/PublicContent/Site
        run: swift ../Tools/redirect-stubs/generate-redirect-stubs.swift _Site Redirects.yaml ../Tools/redirect-stubs/old-urls.txt https://wwdcnotes.com

      - name: Override favicon (if present in repo root)
        working-directory: Public/Content/WWDCNotes/PublicContent
        run: |
          if [ -f favicon.ico ]; then cp favicon.ico Site/_Site/favicon.ico; fi

      # No robots.txt override here: SiteKit's robots.txt already allows crawling and references
      # the sitemap, which is what production wants.

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Public/Content/WWDCNotes/PublicContent/Site/_Site
          publish_branch: gh-pages
          # CNAME is mandatory: without it the wwdcnotes.com custom domain on GitHub Pages breaks.
          cname: wwdcnotes.com
