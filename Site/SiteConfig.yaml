name: "WWDCNotes"
description: "Session notes shared by the community, for the community."
# Production base URL (canonical/og:url/sitemap/robots).
baseURL: "https://wwdcnotes.com"
outputDirectory: "_Site"
assetsDirectory: "Content/Assets"
contentDirectory: "../Sources/WWDCNotes"
defaultLanguage: "en"
# SEO 301 map for the old DocC double-segment URLs, consumed at build time.
redirectsFile: "Redirects.yaml"

author:
  name: "WWDCNotes"
  email: "wwdcnotes@fline.dev"

navigation:
  logo:
    image: "/assets/theme/images/wwdcnotes-logo.webp"
    text: "WWDCNotes"
  items: []

sections:
  - name: "Documentation"
    slug: "documentation"
    contentDirectory: "WWDCNotes.docc"
    urlPrefix: "documentation"

docc:
  # Enable the optional DocC features (off by default):
  # the Contributors pages and the Missing-Sessions page. Search stays default-on, so it is omitted.
  # These are harmless no-op keys on older SiteKit (unknown keys are ignored by the synthesized Codable).
  contributors: true
  missingSessions: true
  # Per-guide sidebar nav icons (guide slug -> FontAwesome free/solid class); ignored where unsupported.
  # A generic fa-file-lines fallback covers any guide without an entry here.
  guideIcons:
    contributing: "fa-solid fa-pen-to-square"
    missingnotes: "fa-solid fa-list-check"
  homeEyebrow: "WWDC Notes"
  # Home hero subtitle.
  homeAbstract: "Session notes shared by the community, for the community."
  # Fenced code blocks with no explicit language default to Swift highlighting,
  # since most WWDC sample code is Swift. Blocks that declare a language are
  # unaffected; omit/empty this to fall back to plain escaped text instead.
  defaultCodeLanguage: "swift"
  brand:
    prefix: "WWDC"
    accent: "Notes"
    logoPath: "theme/images/wwdcnotes-logo-v2.webp"
    # Explicit appbar logo size, pinned so future default changes cannot shrink the brand.
    logoWidth: 30
    logoHeight: 30
  # Sidebar-tree framework-icon registry: key -> FontAwesome glyph class + 1-2 hex colors
  # (2 colors => linear-gradient(145deg, c0, c1)).
  # `design` uses a droplet glyph (distinct from `ai`'s sparkles) and falls back to a 2-color
  # tuple here. `docs` is the brand-neutral slate-indigo fallback glyph; it covers many rows, so
  # it must read clearly. Contrast: each gradient's DARKER stop is the readable anchor on the
  # near-white light bg (#f3f4f7); the LIGHTER stop is the anchor on the near-black dark bg (#080b14).
  frameworks:
    design:        { glyph: "fa-solid fa-droplet",             colors: ["#ff5e8a", "#a05cff"], displayName: "Design" }
    ai:            { glyph: "fa-solid fa-wand-magic-sparkles", colors: ["#6a5cff", "#a05cff"], displayName: "AI" }
    swift:         { glyph: "fa-brands fa-swift",              colors: ["#f05138", "#ff8a3d"], displayName: "Swift" }
    swiftui:       { glyph: "fa-solid fa-layer-group",         colors: ["#1e88e5", "#42a5f5"], displayName: "SwiftUI" }
    swiftdata:     { glyph: "fa-solid fa-database",            colors: ["#0a9d8e", "#34c8b4"], displayName: "SwiftData" }
    xcode:         { glyph: "fa-solid fa-hammer",              colors: ["#2a6fdb", "#5b9bff"], displayName: "Xcode" }
    widgetkit:     { glyph: "fa-solid fa-table-cells-large",   colors: ["#1f9e44", "#5bd97a"], displayName: "WidgetKit" }
    appintents:    { glyph: "fa-solid fa-bolt",               colors: ["#7a5ae0", "#9b7bff"], displayName: "App Intents" }
    alarmkit:      { glyph: "fa-solid fa-clock",              colors: ["#ff3b30", "#ff6b5e"], displayName: "AlarmKit" }
    permissionkit: { glyph: "fa-solid fa-shield-halved",      colors: ["#c46f08", "#ffb14e"], displayName: "PermissionKit" }
    replaykit:     { glyph: "fa-solid fa-circle-play",        colors: ["#e0457b", "#ff6fa3"], displayName: "ReplayKit" }
    media:         { glyph: "fa-solid fa-play",               colors: ["#0883a0", "#3dd6e0"], displayName: "Media" }
    docs:          { glyph: "fa-solid fa-code",               colors: ["#5566c4", "#7e85d6"], displayName: "Docs" }
  # Central per-session framework map (wwdcYY-code → key), generated by the
  # derive-session-frameworks tool. The loader reads this central file instead of editing
  # framework tags into all 2183 notes. Path is relative to this Site directory.
  sessionFrameworksPath: "../Sources/Sessions/session-frameworks.json"
  # Contributors subtree: cap at the top 14, with a neutral fallback avatar
  # when a contributor's GitHub avatar 404s (dead/renamed accounts).
  sidebarContributorsLimit: 14
  # Relative path under the theme images dir (same emit form as logoPath). Core prefixes
  # /assets/ → /assets/theme/images/avatar-fallback.svg (absolute-from-root, deep-page-safe).
  # Do NOT set an absolute /assets/... value: core would double-prefix it.
  avatarFallbackPath: "theme/images/avatar-fallback.svg"
  # Special-page CTAs (Contributors "Become a contributor" + Missing "Learn how to
  # contribute") -> the on-site Contributing guide; and the ⌘K overlay "Try:" suggestion
  # chips. All additive/optional DocCConfig fields.
  contributorsBecomeHref: "/documentation/contributing/"
  missingContributeHref: "/documentation/contributing/"
  # Free search terms (not registry keys); search matching is case-insensitive.
  searchSuggestions: ["Liquid Glass", "Foundation Models", "Concurrency", "Widgets", "Icon Composer"]
  footerCards:
    # CTA targets the on-site Contributing guide (which explains the PR flow), not the GitHub
    # repo directly – same target as contributorsBecomeHref/missingContributeHref above.
    - heading: "Contributing"
      body: "Notes are community-maintained – add or fix one."
      ctaLabel: "Learn how to contribute"
      href: "/documentation/contributing/"
    - heading: "Missing Sessions"
      body: "See which sessions still need notes."
      ctaLabel: "View coverage"
      href: "/documentation/missingnotes/"
  # Footer legal/brand disclaimer block.
  footerDisclaimer: "WWDCNotes is an independent, community-run archive of session notes."
  # Full legal notice in the footer. Plain text, each non-empty line renders as one
  # paragraph (no markdown). The year range is static here: bump the end year each June
  # together with the new years: entry below.
  footerLegalNotice: |
    All content copyright © 2010 – 2026 Apple Inc. All rights reserved.
    Swift, the Swift logo, Swift Playgrounds, Xcode, Instruments, Cocoa Touch, Touch ID, FaceID, iPhone, iPad, Safari, Apple Vision, Apple Watch, App Store, iPadOS, watchOS, visionOS, tvOS, Mac, and macOS are trademarks of Apple Inc., registered in the U.S. and other countries.
    This website is not made by, affiliated with, nor endorsed by Apple.
  # Home page copy: Overview / Contributing / Contributors.
  # Section labels (Overview/Contributing/Topics) + card-link labels (Learn More/
  # Read article) match the SiteKit-core defaults exactly, so no UIStrings overrides.
  homeOverviewLead: "There are three ways to find your way around the notes on this site."
  homeWays:
    - title: "Search anything"
      body: "Press ⌘K or ⌘⇧O (like Xcode's Open Quickly) and search across every session title and note."
    - title: "Open a year"
      body: "Jump into a year's overview below and explore session by session."
    - title: "Use the sidebar"
      body: "Filter by topic or browse the full year tree on the left."
  # linkHref → the on-site Contributing guide (rendered at /documentation/contributing/
  # by the SiteKit build). The "›" chevron is part of the inline link text
  # (core only auto-decorates card links, not general sk-docc-link).
  homeContributing:
    lead: "Missing something? Spotted a mistake?"
    linkText: "Contributions are welcome ›"
    linkHref: "/documentation/contributing/"
  homeContributorsBlurb: "WWDCNotes is only possible thanks to these volunteers. Contribute and get listed here too."
  # Per-year card editorial copy. Keyed by the year nav-node title. stack uses " · " middots.
  # keyVisual is intentionally unset: the real WWDCXX banners live in the catalog
  # (*.docc/Images/WWDCXX.jpeg) and emit via the teleporter at /assets/WWDCXX.jpeg.
  # counts/href/label/banner are all core-derived; we supply only stack/apis/blurb.
  years:
    # WWDC26 facts derived from the 110-session corpus in sessions.json (no Swift version
    # is named anywhere in Apple's session descriptions, so the stack omits Swift).
    WWDC26:
      stack: "Xcode 27 · iOS / iPadOS / macOS / tvOS / visionOS 27"
      apis: "Core AI, Evaluations, Music Understanding"
      blurb: "Core AI on-device models, coding agents in Xcode 27, the Evaluations framework, Music Understanding, and Reality Composer Pro 3 spatial workflows."
    WWDC25:
      stack: "Xcode 26 · Swift 6.2 · iOS / iPadOS / macOS / tvOS / visionOS 26"
      apis: "Foundation Models, AlarmKit, PermissionKit"
      blurb: "Foundation Models on-device, Liquid Glass across platforms, AlarmKit, App Intents everywhere, and a redesigned Icon Composer."
    WWDC24:
      stack: "Xcode 16 · Swift 6 · iOS 18 · macOS 15 Sequoia · visionOS 2"
      apis: "Swift Testing, FinanceKit, TabletopKit"
      blurb: "Swift 6 data-race safety, Apple Intelligence, Swift Testing, TabletopKit, and a more expressive SwiftUI."
    WWDC23:
      stack: "Xcode 15 · Swift 5.9 · iOS 17 · macOS 14 Sonoma · visionOS 1"
      apis: "SwiftData, Observation, StoreKit views"
      blurb: "visionOS arrives, SwiftData replaces Core Data ergonomics, Observation, and macros land in Swift."
    WWDC22:
      stack: "Xcode 14 · Swift 5.7 · iOS 16 · macOS 13 Ventura"
      apis: "WeatherKit, ScreenCaptureKit, Swift Regex"
      blurb: "Lock Screen widgets, WeatherKit, Swift Regex, and the Swift Charts framework debut."
    WWDC21:
      stack: "Xcode 13 · Swift 5.5 · iOS 15 · macOS 12 Monterey"
      apis: "MusicKit, DocC, StoreKit 2"
      blurb: "Swift concurrency: async/await, actors, structured tasks. Plus DocC, MusicKit, and SharePlay."
    WWDC20:
      stack: "Xcode 12 · Swift 5.3 · iOS 14 · macOS 11 Big Sur"
      apis: "WidgetKit, StoreKit Testing, App Clips"
      blurb: "Home Screen widgets, App Clips, the Big Sur redesign, and Apple silicon Macs."
    WWDC19:
      stack: "Xcode 11 · Swift 5.1 · iOS 13 · macOS 10.15 Catalina"
      apis: "Combine, Core Haptics, Create ML"
      blurb: "SwiftUI is announced, Combine, Dark Mode on iOS, Sign in with Apple, and Catalyst."
    WWDC18:
      stack: "Xcode 10 · Swift 4.2 · iOS 12 · macOS 10.14 Mojave"
      apis: "Create ML, Siri Shortcuts, Network.framework"
      blurb: "Dark Mode on the Mac, Siri Shortcuts, Create ML, and big performance wins."
    WWDC17:
      stack: "Xcode 9 · Swift 4.0 · iOS 11 · macOS 10.13 High Sierra"
      apis: "Core ML, ARKit, Core NFC"
      blurb: "ARKit, Core ML, drag & drop on iPad, and the Files app."
    WWDC16:
      stack: "Xcode 8 · Swift 3.0 · iOS 10 · macOS 10.12 Sierra"
      apis: "SiriKit, Speech, User Notifications"
      blurb: "Swift 3 lands, SiriKit opens to apps, iMessage apps, and the Sierra rename."
    WWDC15:
      stack: "Xcode 7 · Swift 2.0 · iOS 9 · OS X 10.11 El Capitan"
      apis: "watchOS 2, App Search, 3D Touch"
      blurb: "Swift goes open source, watchOS native apps, App Thinning, and Split View on iPad."
    WWDC14:
      stack: "Xcode 6 · Swift 1.0 · iOS 8 · OS X 10.10 Yosemite"
      apis: "Swift, HealthKit, HomeKit, Metal"
      blurb: "Swift is introduced to the world, alongside HealthKit, HomeKit, and Metal."
    WWDC13:
      stack: "Xcode 5 · iOS 7 · OS X 10.9 Mavericks"
      apis: "Sprite Kit, Multipeer Connectivity"
      blurb: "The iOS 7 flat redesign, Sprite Kit, and the first free OS X release."
    WWDC12:
      stack: "Xcode 4 · iOS 6 · OS X 10.8 Mountain Lion"
      apis: "Passbook, Auto Layout, Social.framework"
      blurb: "Passbook, Auto Layout, and the integration of Maps and Facebook."
    WWDC11:
      stack: "iOS 5 · OS X 10.7 Lion"
      apis: "iCloud, Storyboards, ARC"
      blurb: "iCloud, Storyboards, Automatic Reference Counting, and the Notification Center."
    WWDC10:
      stack: "iOS 4"
      apis: "Multitasking, Game Center"
      blurb: "Multitasking arrives on iPhone, Game Center, and the Retina display."
